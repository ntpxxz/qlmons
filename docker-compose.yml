version: '3.8'

services:
  hud:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      - FLASK_ENV=production
      - FLASK_PORT=8090
      - SQL_SERVER=${SQL_SERVER:-192.168.101.219}
      - SQL_PORT=${SQL_PORT:-1433}
      - SQL_USER=${SQL_USER}
      - SQL_PASSWORD=${SQL_PASSWORD}
      - SQL_DATABASE=${SQL_DATABASE:-master}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - hud-network

networks:
  hud-network:
    driver: bridge
