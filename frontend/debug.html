<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Data Debug</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #4ec9b0;
            border-bottom: 2px solid #4ec9b0;
            padding-bottom: 10px;
        }
        h2 {
            color: #9cdcfe;
            margin-top: 30px;
        }
        button {
            padding: 10px 20px;
            background: #007acc;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            margin: 10px 5px 10px 0;
        }
        button:hover {
            background: #005a9e;
        }
        .response {
            background: #252526;
            border: 1px solid #3e3e42;
            padding: 15px;
            border-radius: 4px;
            margin: 15px 0;
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
        }
        pre {
            margin: 0;
            color: #ce9178;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        th, td {
            border: 1px solid #3e3e42;
            padding: 10px;
            text-align: left;
        }
        th {
            background: #252526;
            color: #9cdcfe;
        }
        tr:nth-child(even) {
            background: #1e1e1e;
        }
        .loading {
            color: #ce9178;
        }
        .error {
            color: #f48771;
        }
        .success {
            color: #4ec9b0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Backend API Debug Page</h1>

        <div>
            <button onclick="fetchSessions()">📊 Fetch Sessions Data</button>
            <button onclick="fetchPending()">⚠️ Fetch Pending Hosts</button>
            <button onclick="fetchAuditLog()">📋 Fetch Audit Log</button>
        </div>

        <h2>Raw JSON Response</h2>
        <div id="response" class="response">
            <p class="loading">Click a button to fetch data...</p>
        </div>

        <h2>Formatted Table View</h2>
        <div id="table-view"></div>
    </div>

    <script>
        async function fetchSessions() {
            const responseDiv = document.getElementById('response');
            const tableDiv = document.getElementById('table-view');

            responseDiv.innerHTML = '<p class="loading">Loading...</p>';
            tableDiv.innerHTML = '';

            try {
                const response = await fetch('/api/sessions');
                const data = await response.json();

                responseDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;

                if (data.sessions && data.sessions.length > 0) {
                    let html = '<h3>Sessions Data in Table Format:</h3>';
                    html += '<table>';
                    html += '<tr>';
                    Object.keys(data.sessions[0]).forEach(key => {
                        html += `<th>${key}</th>`;
                    });
                    html += '</tr>';

                    data.sessions.forEach(session => {
                        html += '<tr>';
                        Object.values(session).forEach(value => {
                            html += `<td>${value || 'N/A'}</td>`;
                        });
                        html += '</tr>';
                    });

                    html += '</table>';
                    tableDiv.innerHTML = html;
                }
            } catch (error) {
                responseDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
            }
        }

        async function fetchPending() {
            const responseDiv = document.getElementById('response');
            const tableDiv = document.getElementById('table-view');

            responseDiv.innerHTML = '<p class="loading">Loading...</p>';
            tableDiv.innerHTML = '';

            try {
                const response = await fetch('/api/pending-hosts');
                const data = await response.json();

                responseDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;

                if (data.pending_hosts && data.pending_hosts.length > 0) {
                    let html = '<h3>Pending Hosts Data in Table Format:</h3>';
                    html += '<table>';
                    html += '<tr>';
                    Object.keys(data.pending_hosts[0]).forEach(key => {
                        html += `<th>${key}</th>`;
                    });
                    html += '</tr>';

                    data.pending_hosts.forEach(host => {
                        html += '<tr>';
                        Object.values(host).forEach(value => {
                            html += `<td>${value || 'N/A'}</td>`;
                        });
                        html += '</tr>';
                    });

                    html += '</table>';
                    tableDiv.innerHTML = html;
                }
            } catch (error) {
                responseDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
            }
        }

        async function fetchAuditLog() {
            const responseDiv = document.getElementById('response');
            const tableDiv = document.getElementById('table-view');

            responseDiv.innerHTML = '<p class="loading">Loading...</p>';
            tableDiv.innerHTML = '';

            try {
                const response = await fetch('/api/audit-log');
                const data = await response.json();

                responseDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;

                if (data.logs && data.logs.length > 0) {
                    let html = '<h3>Audit Log Data in Table Format:</h3>';
                    html += '<table>';
                    html += '<tr>';
                    Object.keys(data.logs[0]).forEach(key => {
                        html += `<th>${key}</th>`;
                    });
                    html += '</tr>';

                    data.logs.forEach(log => {
                        html += '<tr>';
                        Object.values(log).forEach(value => {
                            html += `<td>${value || 'N/A'}</td>`;
                        });
                        html += '</tr>';
                    });

                    html += '</table>';
                    tableDiv.innerHTML = html;
                }
            } catch (error) {
                responseDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
